<div class="login-wrap">
  <div class="login-card">
    <h1>Panel Admin</h1>
    <p class="sub">Caporales Cristos / C'Origen</p>

    <form (ngSubmit)="submit()" class="form">
      <label>
        Usuario
        <input type="text" [(ngModel)]="username" name="username" required autocomplete="username" />
      </label>
      <label>
        Contraseña
        <div class="password-wrap">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required autocomplete="current-password" />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword" [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Ver contraseña'" title="{{ showPassword ? 'Ocultar' : 'Ver contraseña' }}">
            {{ showPassword ? 'Ocultar' : 'Ver' }}
          </button>
        </div>
      </label>
      @if (error) {
        <p class="error">Usuario o contraseña incorrectos.</p>
      }
      <button type="submit" class="btn" [disabled]="loading">
        {{ loading ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>

    <a routerLink="/" class="back">Volver al inicio</a>
  </div>
</div>
